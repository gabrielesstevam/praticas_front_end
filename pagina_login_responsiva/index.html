<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio 016</title>
    <!-- ICONES -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet">
    <!-- MEDIA-QUEIRES -->
    <link rel="stylesheet" href="styles/mobileFirst.css">
    <link rel="stylesheet" href="styles/media-queries.css">
</head>

<body>
    <main>
        <section id="login">
            <div id="image"></div>
            <div id="form">
                <h1>Login</h1>
                <p>Seja em-vindo(a) novamente. Faça login para acessar sua conta e poder fazer as configurações no seu
                    ambiente.</p>
                <form action="login.php" method="post" autocomplete="on">

                    <div class="campo">
                        <i id="icon" class="material-icons">account_circle</i>
                        <input type="email" name="login" id="ilogin" placeholder="Digite seu e-mail:" autocomplete="email" required maxlength="30">
                        <label for="ilogin">Login</label>
                    </div>

                    <div class="campo">
                        <i id="icon" class="material-icons">vpn_key</i>
                        <input type="password" name="senha" id="isenha" placeholder="Digite sua senha:" autocomplete="current-password" required minlength="8" maxlength="15">
                        <label for="isenha">Senha</label>
                    </div>

                    <input type="submit" value="Entrar">

                    <a href="#" class="botao">Esqueci a senha<i id="icon" class="material-icons">mail</i></a>
                </form>
            </div>
        </section>
    </main>
</body>

</html>
