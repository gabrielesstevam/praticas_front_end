<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp</title>
    <link rel="stylesheet" href="style/main.css"> <!-- CSS -->
    <script src="https://kit.fontawesome.com/9215fe2f52.js" crossorigin="anonymous"></script> <!-- Acesso de Icones -->
    <link rel="shortcut icon" href="images/favicon_whatsapp.ico" type="image/x-icon"> <!-- Favicon -->
</head>
<body>
    <main id="viewport">
        <div class="menu"> <!-- MENU LATERAL -->
            <ul class="menu_itens">
                <li class="initial">
                    <i class="fa-solid fa-message"></i>
                    <span>Conversas</span>
                </li>
                <li>
                    <i class="fa-solid fa-photo-film story"></i>
                    <span>Status</span></li>
                <li>
                    <i class="fa-solid fa-bullhorn"></i>
                    <span>Canais</span>
                </li>
                <li>
                    <i class="fa-solid fa-arrows-down-to-people"></i>
                    <span>Comunidades</span>
                </li>
                <hr>
                <li>
                    <i class="fa-brands fa-meta meta_ai"></i>
                    <span>Meta Ai</span>
                </li>
            </ul>
            <ul class="menu_config">
                <li>
                    <i class="fa-solid fa-images midia"></i>
                    <span>Mídia</span>
                </li>
                <li>
                    <i class="fa-solid fa-circle-user conta"></i>
                    <span>Você</span>
                </li>
            </ul>
        </div>
        <div class="acesso">
                <div class="title">
                    <h1>WhatsApp</h1>
                    <ul>
                        <li tabindex="0"><i class="fa-solid fa-comment-medical"></i></li>
                        <li><i class="fa-solid fa-ellipsis-vertical"></i></li>
                    </ul>
                </div>
                <form action="#" method="post">
                    <label for="isearch"><i class="fa-solid fa-magnifying-glass"></i><input type="text" name="search" id="isearch" placeholder="Pesquisar ou começar uma nova conversa"></label>
                </form>
                <div class="filtros">
                    <ul>
                        <li><a href="#">Tudo</a></li>
                        <li><a href="#">Favoritas</a></li>
                        <li><a href="#">Grupos</a></li>
                        <li><a href="#"><i class="fa-solid fa-plus"></i></a></li>
                    </ul>
                </div>
        <div class="conteudo">
        </div>
    </main>
</body>
</html>
